<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر فولتشر 🚀</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1e293b; --bg: #f1f5f9; --white: #ffffff; --num-color: #dc2626; --link-dark: #000080; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: linear-gradient(135deg, var(--primary), #334155); color: white; padding: 30px; text-align: center; border-radius: 0 0 30px 30px; }
        .container { padding: 20px; max-width: 600px; margin: auto; }
        #adminPanel { display: none; background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .app-card { background: var(--white); border-radius: 25px; padding: 20px; position: relative; margin-bottom: 20px; text-align: center; border: 1px solid #e2e8f0; }
        .app-img { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; }
        .info-field { background: #f8fafc; border-radius: 12px; padding: 10px; margin-top: 10px; position: relative; text-align: right; }
        .number-highlight { color: var(--num-color); font-weight: 900; font-size: 1.2rem; }
        .link-highlight { color: var(--link-dark); font-weight: 700; word-break: break-all; }
        .btn-action { background: var(--primary); color: white; padding: 15px; border-radius: 15px; text-decoration: none; display: block; margin-top: 10px; font-weight: bold; border: none; width: 100%; cursor: pointer; }
        .admin-btns { position: absolute; top: 10px; left: 10px; display: flex; gap: 5px; }
        input, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .loading { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body>
<div id="loading" class="loading">جاري الحفظ في السحابة...</div>
<div class="header"><h1>متجر فولتشر 🚀</h1></div>
<div class="container">
    <div id="adminPanel">
        <h3>إضافة تطبيق جديد</h3>
        <input type="hidden" id="editDocId">
        <input type="file" id="appImg" accept="image/*" onchange="const r=new FileReader(); r.onload=e=>window.imgB64=e.target.result; r.readAsDataURL(this.files[0])">
        <input type="text" id="appName" placeholder="اسم التطبيق">
        <input type="text" id="appCode" placeholder="كود Downloader">
        <input type="text" id="appLink" placeholder="رابط التحميل">
        <textarea id="appDesc" placeholder="وصف التطبيق"></textarea>
        <button class="btn-action" onclick="saveApp()" style="background:#059669">حفظ في السحابة</button>
    </div>
    <div id="appGrid"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { projectId: "vulture-app-1efba" }; // السحابة الخاصة بك
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const colRef = collection(db, "apps");

    onSnapshot(colRef, (s) => {
        const grid = document.getElementById('appGrid'); grid.innerHTML = "";
        s.forEach((d) => {
            const item = d.data(); const id = d.id;
            grid.innerHTML += `<div class="app-card">
                <div class="admin-btns" style="${new URLSearchParams(location.search).get('admin')==='123'?'display:flex':'none'}">
                    <button onclick="editApp('${id}',${JSON.stringify(item).replace(/"/g,'&quot;')})">📝</button>
                    <button onclick="deleteApp('${id}')">🗑️</button>
                </div>
                <img src="${item.img}" class="app-img">
                <h3>${item.name}</h3>
                <div class="info-field">كود: <span class="number-highlight">${item.code}</span></div>
                <div class="info-field"><span class="link-highlight">${item.link}</span></div>
                <button class="btn-action" onclick="window.open('${item.link}')">تحميل الآن</button>
            </div>`;
        });
        if(new URLSearchParams(location.search).get('admin')==='123') document.getElementById('adminPanel').style.display='block';
    });

    window.saveApp = async () => {
        const id = document.getElementById('editDocId').value;
        const data = { 
            name: document.getElementById('appName').value,
            code: document.getElementById('appCode').value,
            link: document.getElementById('appLink').value,
            desc: document.getElementById('appDesc').value
        };
        if(window.imgB64) data.img = window.imgB64;
        document.getElementById('loading').style.display='flex';
        id ? await updateDoc(doc(db,"apps",id), data) : await addDoc(colRef, data);
        location.reload();
    };

    window.editApp = (id, data) => {
        document.getElementById('editDocId').value = id;
        document.getElementById('appName').value = data.name;
        document.getElementById('appCode').value = data.code;
        document.getElementById('appLink').value = data.link;
        document.getElementById('appDesc').value = data.desc;
    };

    window.deleteApp = async (id) => { if(confirm('حذف؟')) await deleteDoc(doc(db,"apps",id)); };
</script>
</body>
</html>
